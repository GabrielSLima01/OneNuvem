services:
  storage-node-1:
    image: onenuvem-demo:latest
    build: .
    command: ["DemoStorageNode", "server-1", "5001", "/data"]
    ports:
      - "5001:5001"
    volumes:
      - storage-node-1-data:/data

  storage-node-2:
    image: onenuvem-demo:latest
    build: .
    command: ["DemoStorageNode", "server-2", "5002", "/data"]
    ports:
      - "5002:5002"
    volumes:
      - storage-node-2-data:/data

  storage-node-3:
    image: onenuvem-demo:latest
    build: .
    command: ["DemoStorageNode", "server-3", "5003", "/data"]
    ports:
      - "5003:5003"
    volumes:
      - storage-node-3-data:/data

  middleware:
    image: onenuvem-demo:latest
    build: .
    command: ["MiddlewareServer"]
    ports:
      - "8000:8000"
    environment:
      MIDDLEWARE_PORT: "8000"
      MIDDLEWARE_NODES: "NODE_1,NODE_2,NODE_3"
      NODE_1_NAME: "server-1"
      NODE_1_HOST: "storage-node-1"
      NODE_1_PORT: "5001"
      NODE_2_NAME: "server-2"
      NODE_2_HOST: "storage-node-2"
      NODE_2_PORT: "5002"
      NODE_3_NAME: "server-3"
      NODE_3_HOST: "storage-node-3"
      NODE_3_PORT: "5003"
    depends_on:
      - storage-node-1
      - storage-node-2
      - storage-node-3

  demo-client:
    image: onenuvem-demo:latest
    build: .
    command: ["DemoClient", "middleware", "8000", "scenario"]
    profiles:
      - demo

volumes:
  storage-node-1-data:
  storage-node-2-data:
  storage-node-3-data:
